<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8">
      <title>Tribes X Live</title>
      <meta name="description" content="Play against players around the world in over 100 arenas, and a dozen game modes, in one of the most competitive shooters online today.">
      <meta name="keywords" content="quake,quakelive,id software,bethesda,zenimax">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link href='https://fonts.googleapis.com/css?family=Noto+Sans:400,700' rel='stylesheet' type='text/css'>
      <link rel="stylesheet" href="normalize.css">
      <link rel="stylesheet" href="skeleton.css">
      <link rel="stylesheet" href="main.css">
      <link rel="icon" type="image/png" href="favicon.png">
   </head>
   <body>
      <div class="attract">
       <video autoplay loop muted playsinline poster="placeholder.jpg">
            <source src="loop.mp4" type="video/mp4">
        </video>
         <div class="overlay">
            <img class="logo" src="logo.png"/>
            <br><br><br>
            <a href="#" class="quickconnect"></a>
             <br><br>
            <a href="#" class="playwithbots"></a>
             <br><br>
            <a href="#" class="watchdemos"></a>
             <br><br>
             <a href="#" class="gameinfo"></a>
             <br><br>
            <a href="#" class="downloadgame"></a>
         </div>
         <footer class="row" align="center"><center>
      Made by Enforcer  &nbsp;:&nbsp;  Game updated on 10.03.2026  &nbsp;:&nbsp;  Players online - X
       <br><br></center>
      </footer>

      <audio id="hoverSound" src="select.wav" preload="auto"></audio>

      <script>
         document.addEventListener('DOMContentLoaded', function() {
            const sound = document.getElementById('hoverSound');
            const links = document.querySelectorAll('a');

            links.forEach(function(link) {
               link.addEventListener('mouseenter', function() {
                  // Сбрасываем звук на начало, чтобы он играл при быстром переключении между ссылками
                  sound.currentTime = 0; 
                  // Запускаем звук. catch нужен, чтобы браузер не ругался в консоль, 
                  // если пользователь еще не кликнул по странице (защита от автовоспроизведения)
                  sound.play().catch(function(error) {
                     // Ошибку можно игнорировать, она пропадет после первого клика по странице
                  });
               });
            });
         });
      </script>
   </body>
</html>
