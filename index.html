<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8">

      <meta name="keywords" content="quake,quakelive,id software,bethesda,zenimax">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link href='https://fonts.googleapis.com/css?family=Noto+Sans:400,700' rel='stylesheet' type='text/css'>
      <link rel="stylesheet" href="normalize.css">
      <link rel="stylesheet" href="skeleton.css">
      <link rel="stylesheet" href="main.css">
      <link rel="icon" type="image/png" href="favicon.png">
   </head>
   <body>
      <div class="attract">
       <video autoplay loop muted playsinline poster="placeholder.jpg">
            <source src="loop.mp4" type="video/mp4">
        </video>
         <div class="overlay">
            <img class="logo" src="logo.png"/>
            <br><br><br>
            <a href="#" class="quickconnect"></a>
             <br><br>
            <a href="#" class="playwithbots"></a>
             <br><br>
            <a href="#" class="watchdemos"></a>
             <br><br>
             <a href="#" class="gameinfo"></a>
             <br><br>
            <a href="#" class="downloadgame"></a>
         </div>
         <footer class="row" align="center"><center>
      Made by Enforcer  &nbsp;:&nbsp;  Game updated on 10.03.2026  &nbsp;:&nbsp;  Players online - X
       <br><br></center>
      </footer>
<script>
         document.addEventListener('DOMContentLoaded', function() {
            // Инициализируем Web Audio API
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();
            let hoverBuffer = null;

            // Загружаем файл select.wav в память браузера
            fetch('select.wav')
               .then(response => response.arrayBuffer())
               .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
               .then(audioBuffer => {
                  hoverBuffer = audioBuffer;
               })
               .catch(error => console.error("Ошибка загрузки звука:", error));

            // Разблокируем звук по первому клику на странице (правило браузеров)
            document.body.addEventListener('click', function() {
               if (audioCtx.state === 'suspended') {
                  audioCtx.resume();
               }
            }, { once: true });

            const links = document.querySelectorAll('a');

            links.forEach(function(link) {
               link.addEventListener('mouseenter', function() {
                  // Если звук еще не загрузился или браузер ждет первого клика - ничего не делаем
                  if (!hoverBuffer || audioCtx.state === 'suspended') return;

                  // Создаем источник звука и запускаем его (это происходит мгновенно)
                  const source = audioCtx.createBufferSource();
                  source.buffer = hoverBuffer;
                  
                  // Для регулировки громкости можно раскомментировать строки ниже:
                  // const gainNode = audioCtx.createGain();
                  // gainNode.gain.value = 0.5; // Громкость 50%
                  // source.connect(gainNode);
                  // gainNode.connect(audioCtx.destination);
                  
                  // Если громкость менять не нужно, подключаем напрямую:
                  source.connect(audioCtx.destination);
                  source.start(0);
               });
            });
         });
      </script>
     
   </body>
</html>
