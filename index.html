<audio id="hoverSound" src="select.wav" preload="auto"></audio>

      <script>
         document.addEventListener('DOMContentLoaded', function() {
            const soundNode = document.getElementById('hoverSound');
            const links = document.querySelectorAll('a');

            links.forEach(function(link) {
               link.addEventListener('mouseenter', function() {
                  // Клонируем узел звука при каждом наведении.
                  // Это избавляет от ошибок, если водить мышкой очень быстро.
                  const clone = soundNode.cloneNode();
                  
                  // Обязательно устанавливаем громкость (от 0.0 до 1.0), иногда это помогает
                  clone.volume = 0.5; 

                  clone.play().catch(function(error) {
                     // Выводим ошибку в консоль браузера (F12), чтобы было видно, если браузер блокирует звук
                     console.log("Ждем первого клика по странице для разблокировки звука:", error.message);
                  });
               });
            });
         });
      </script>
