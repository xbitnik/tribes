<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fedorazzz Mazes :)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameCanvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
        }

        h1 {
            font-size: 36px;
            text-align: center;
            margin-bottom: 30px;
            color: #4CAF50;
            text-shadow: 2px 2px 4px #000;
        }

        #sensor-error {
            display: none;
            color: #ff4444;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            max-width: 80%;
            border: 1px solid #ff4444;
            padding: 10px;
            background: rgba(255,0,0,0.1);
        }

        button {
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.95);
            background-color: #45a049;
        }

        button:disabled {
            background-color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: auto;
            z-index: 5;
            display: none;
        }

        #timer {
            font-size: 24px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 5px;
        }

        #pauseBtn {
            padding: 8px 20px;
            font-size: 18px;
            background-color: #f44336;
        }

        #pauseBtn:active {
            background-color: #d32f2f;
        }

        #build-version {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">

        <div id="hud">
            <div id="timer">00:00.00</div>
            <button id="pauseBtn">Pause</button>
        </div>

        <div id="startScreen" class="screen">
            <h1 id="startTitle">Fedorazzz Mazes :)</h1>
            <div id="sensor-error">
                ERROR: Accelerometer blocked!<br>
                Browsers require HTTPS for sensors.<br>
                Please use a secure connection.
            </div>
            <button id="startBtn">START</button>
            <div id="build-version">Build Version - 1.2</div>
        </div>

        <div id="pauseScreen" class="screen hidden">
            <h1>Paused</h1>
            <button id="resumeBtn">Resume</button>
        </div>

        <div id="finishScreen" class="screen hidden">
            <h1>Level Complete!</h1>
            <p id="finalTime" style="font-size: 26px; margin-bottom: 30px; font-weight: bold;"></p>
            <button id="restartBtn">Play Again</button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Элементы
        const startScreen = document.getElementById('startScreen');
        const pauseScreen = document.getElementById('pauseScreen');
        const finishScreen = document.getElementById('finishScreen');
        const hud = document.getElementById('hud');
        const timerEl = document.getElementById('timer');
        const finalTimeEl = document.getElementById('finalTime');
        const errorEl = document.getElementById('sensor-error');
        const titleEl = document.getElementById('startTitle');

        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Настройки игры
        const TILE_SIZE = 32;
        const BALL_HITBOX = 24; // Логический размер (для скольжения)
        const BALL_VISUAL = 32; // Визуальный размер (для отрисовки)

        let cols, rows;
        let maze = [];
        let finishCell = { x: 0, y: 0 };

        const wallImg = new Image();
        wallImg.src = 'wall.png';
        const ballImg = new Image();
        ballImg.src = 'ball.png';

        let gameState = 'START';

        // Физика шарика
        let ball = { x: 0, y: 0, vx: 0, vy: 0 };
        const gravityScale = 0.6;    // Множитель силы "гравитации" от наклона
        const friction = 0.98;       // Трение качения (чем ближе к 1, тем дольше катится)
        const bounceFactor = 0.45;   // Сила отскока (0 - нет отскока, 1 - резиновый мяч)
        const maxSpeed = 12;         // Максимальная скорость качения

        let tiltX = 0;
        let tiltY = 0;

        // Таймер
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Генерация Лабиринта ---
        function generateMaze() {
            cols = Math.floor(canvas.width / TILE_SIZE);
            rows = Math.floor(canvas.height / TILE_SIZE);
            if (cols % 2 === 0) cols--;
            if (rows % 2 === 0) rows--;

            const offsetX = (canvas.width - cols * TILE_SIZE) / 2;
            const offsetY = (canvas.height - rows * TILE_SIZE) / 2;
            ctx.setTransform(1, 0, 0, 1, offsetX, offsetY);

            maze = Array(cols).fill().map(() => Array(rows).fill(1));

            const stack = [];
            let current = { x: 1, y: 1 };
            maze[current.x][current.y] = 0;
            stack.push(current);

            while (stack.length > 0) {
                current = stack[stack.length - 1];
                let neighbors = [];

                if (current.y - 2 > 0 && maze[current.x][current.y - 2] === 1) neighbors.push({ x: current.x, y: current.y - 2, dx: 0, dy: -1 });
                if (current.x + 2 < cols - 1 && maze[current.x + 2][current.y] === 1) neighbors.push({ x: current.x + 2, y: current.y, dx: 1, dy: 0 });
                if (current.y + 2 < rows - 1 && maze[current.x][current.y + 2] === 1) neighbors.push({ x: current.x, y: current.y + 2, dx: 0, dy: 1 });
                if (current.x - 2 > 0 && maze[current.x - 2][current.y] === 1) neighbors.push({ x: current.x - 2, y: current.y, dx: -1, dy: 0 });

                if (neighbors.length > 0) {
                    let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[current.x + next.dx][current.y + next.dy] = 0;
                    maze[next.x][next.y] = 0;
                    stack.push(next);
                } else {
                    stack.pop();
                }
            }

            // Старт
            ball.x = 1 * TILE_SIZE + (TILE_SIZE - BALL_HITBOX) / 2;
            ball.y = 1 * TILE_SIZE + (TILE_SIZE - BALL_HITBOX) / 2;
            ball.vx = 0;
            ball.vy = 0;

            // Финиш
            finishCell = { x: cols - 2, y: rows - 2 };
            while (maze[finishCell.x][finishCell.y] === 1) {
                finishCell.x--;
                if (finishCell.x <= 0) { finishCell.x = cols - 2; finishCell.y--; }
            }
        }

        // --- Сенсоры (Акселерометр) ---
        let sensorsActive = false;

        window.addEventListener("deviceorientation", (event) => {
            if (event.beta !== null && event.gamma !== null) {
                sensorsActive = true;
                hideError();

                if (gameState !== 'PLAYING') return;

                tiltX = event.gamma || 0;
                tiltY = event.beta || 0;

                // Ограничиваем угол (90 градусов = макс. сила)
                if (tiltX > 90) tiltX = 90;
                if (tiltX < -90) tiltX = -90;
                if (tiltY > 90) tiltY = 90;
                if (tiltY < -90) tiltY = -90;
            }
        }, true);

        setTimeout(() => {
            if (!sensorsActive) showError();
        }, 800);

        function showError() {
            if (location.protocol !== 'https:') {
                titleEl.style.display = 'none';
                errorEl.style.display = 'block';
                startBtn.disabled = true;
                startBtn.innerText = 'HTTPS Required';
            }
        }

        function hideError() {
            titleEl.style.display = 'block';
            errorEl.style.display = 'none';
            startBtn.disabled = false;
            startBtn.innerText = 'START';
        }

        // --- Вспомогательная функция проверки стен для физики ---
        // Возвращает прямоугольник первой стены, с которой пересекается шарик
        function getIntersectingWall(bx, by) {
            let leftCol = Math.floor(bx / TILE_SIZE);
            let rightCol = Math.floor((bx + BALL_HITBOX - 0.1) / TILE_SIZE);
            let topRow = Math.floor(by / TILE_SIZE);
            let bottomRow = Math.floor((by + BALL_HITBOX - 0.1) / TILE_SIZE);

            for (let c = leftCol; c <= rightCol; c++) {
                for (let r = topRow; r <= bottomRow; r++) {
                    // Выход за границы считаем стеной
                    if (c < 0 || c >= cols || r < 0 || r >= rows || maze[c][r] === 1) {
                        return {
                            left: c * TILE_SIZE,
                            right: c * TILE_SIZE + TILE_SIZE,
                            top: r * TILE_SIZE,
                            bottom: r * TILE_SIZE + TILE_SIZE
                        };
                    }
                }
            }
            return null; // Столкновений нет
        }

        // --- Физика и Коллизии (Раздельные оси) ---
        function updatePhysics() {
            if (gameState !== 'PLAYING') return;

            // Вычисляем ускорение по принципу наклонной плоскости (синус угла)
            let accelX = Math.sin(tiltX * Math.PI / 180) * gravityScale;
            let accelY = Math.sin(tiltY * Math.PI / 180) * gravityScale;

            ball.vx += accelX;
            ball.vy += accelY;

            // Трение
            ball.vx *= friction;
            ball.vy *= friction;

            // Ограничение максимальной скорости
            if (ball.vx > maxSpeed) ball.vx = maxSpeed;
            if (ball.vx < -maxSpeed) ball.vx = -maxSpeed;
            if (ball.vy > maxSpeed) ball.vy = maxSpeed;
            if (ball.vy < -maxSpeed) ball.vy = -maxSpeed;

            // --- ДВИЖЕНИЕ И СТОЛКНОВЕНИЯ ПО ОСИ X ---
            ball.x += ball.vx;
            let hitX = getIntersectingWall(ball.x, ball.y);
            if (hitX) {
                // Если врезались, выталкиваем шарик обратно
                if (ball.vx > 0) {
                    ball.x = hitX.left - BALL_HITBOX; // Врезались правой стороной
                } else if (ball.vx < 0) {
                    ball.x = hitX.right;              // Врезались левой стороной
                }
                // Отскок
                ball.vx *= -bounceFactor;
                // Гасим микро-отскоки, чтобы шарик не "дрожал"
                if (Math.abs(ball.vx) < 0.5) ball.vx = 0;
            }

            // --- ДВИЖЕНИЕ И СТОЛКНОВЕНИЯ ПО ОСИ Y ---
            ball.y += ball.vy;
            let hitY = getIntersectingWall(ball.x, ball.y);
            if (hitY) {
                if (ball.vy > 0) {
                    ball.y = hitY.top - BALL_HITBOX;  // Врезались низом
                } else if (ball.vy < 0) {
                    ball.y = hitY.bottom;             // Врезались верхом
                }
                ball.vy *= -bounceFactor;
                if (Math.abs(ball.vy) < 0.5) ball.vy = 0;
            }

            // --- ПРОВЕРКА ФИНИША ---
            let finishRect = {
                left: finishCell.x * TILE_SIZE, right: finishCell.x * TILE_SIZE + TILE_SIZE,
                top: finishCell.y * TILE_SIZE, bottom: finishCell.y * TILE_SIZE + TILE_SIZE
            };

            // Проверяем центр шарика
            let ballCenterX = ball.x + BALL_HITBOX / 2;
            let ballCenterY = ball.y + BALL_HITBOX / 2;

            if (ballCenterX > finishRect.left && ballCenterX < finishRect.right &&
                ballCenterY > finishRect.top && ballCenterY < finishRect.bottom) {
                finishGame();
            }
        }

        // --- Отрисовка ---
        function draw() {
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            if (gameState === 'START') return;

            // Отрисовка стен
            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    if (maze[x][y] === 1) {
                        if (wallImg.complete && wallImg.naturalWidth > 0) {
                            ctx.drawImage(wallImg, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        } else {
                            ctx.fillStyle = '#444';
                            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        }
                    }
                }
            }

            // Отрисовка зоны финиша
            ctx.fillStyle = 'rgba(76, 175, 80, 0.4)';
            ctx.fillRect(finishCell.x * TILE_SIZE, finishCell.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = '#FFF';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('??', finishCell.x * TILE_SIZE + TILE_SIZE/2, finishCell.y * TILE_SIZE + TILE_SIZE/2);

            // Отрисовка шарика (центрируем картинку 32x32 поверх хитбокса 24x24)
            let drawX = ball.x - (BALL_VISUAL - BALL_HITBOX) / 2;
            let drawY = ball.y - (BALL_VISUAL - BALL_HITBOX) / 2;

            if (ballImg.complete && ballImg.naturalWidth > 0) {
                ctx.drawImage(ballImg, drawX, drawY, BALL_VISUAL, BALL_VISUAL);
            } else {
                ctx.fillStyle = '#2196F3';
                ctx.beginPath();
                ctx.arc(ball.x + BALL_HITBOX/2, ball.y + BALL_HITBOX/2, BALL_VISUAL/2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function loop() {
            updatePhysics();
            draw();
            requestAnimationFrame(loop);
        }

        // --- Таймер ---
        function updateTimer() {
            let now = Date.now();
            let diff = elapsedTime + (now - startTime);

            let minutes = Math.floor(diff / 60000);
            let seconds = Math.floor((diff % 60000) / 1000);
            let ms = Math.floor((diff % 1000) / 10);

            timerEl.innerText =
                (minutes < 10 ? '0' : '') + minutes + ':' +
                (seconds < 10 ? '0' : '') + seconds + '.' +
                (ms < 10 ? '0' : '') + ms;
        }

        // --- Управление ---
        function startGame() {
            if (!sensorsActive && location.protocol !== 'https:') {
                alert("Game needs HTTPS to read accelerometer data.");
                return;
            }

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') initLevel();
                        else alert("Accelerometer permission denied.");
                    })
                    .catch(console.error);
            } else {
                if (sensorsActive) {
                    initLevel();
                } else {
                    alert("Accelerometer not detected or blocked (needs HTTPS).");
                }
            }
        }

        function initLevel() {
            startScreen.classList.add('hidden');
            finishScreen.classList.add('hidden');
            hud.style.display = 'flex';

            generateMaze();

            gameState = 'PLAYING';
            elapsedTime = 0;
            startTime = Date.now();
            updateTimer();
            timerInterval = setInterval(updateTimer, 30);
        }

        function togglePause() {
            if (gameState === 'PLAYING') {
                gameState = 'PAUSED';
                clearInterval(timerInterval);
                elapsedTime += Date.now() - startTime;
                pauseScreen.classList.remove('hidden');
                hud.style.display = 'none';
            } else if (gameState === 'PAUSED') {
                gameState = 'PLAYING';
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 30);
                pauseScreen.classList.add('hidden');
                hud.style.display = 'flex';
            }
        }

        function finishGame() {
            gameState = 'FINISHED';
            clearInterval(timerInterval);
            elapsedTime += Date.now() - startTime;
            updateTimer();

            hud.style.display = 'none';
            finalTimeEl.innerText = "Time: " + timerEl.innerText;
            finishScreen.classList.remove('hidden');
        }

        function bindButton(btn, action) {
            btn.addEventListener('click', action);
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                action();
            });
        }

        bindButton(startBtn, startGame);
        bindButton(pauseBtn, togglePause);
        bindButton(resumeBtn, togglePause);
        bindButton(restartBtn, initLevel);

        requestAnimationFrame(loop);

    </script>
</body>
</html>
